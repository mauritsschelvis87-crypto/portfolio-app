name: medical-data-platform

services:
  postgres:
    image: postgres:15-alpine
    container_name: medical-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - medical-net

  ai-service:
    image: s1156856/medical-ai-service:latest
    container_name: medical-ai-service
    restart: unless-stopped
    networks:
      - medical-net

  backend:
    image: s1156856/medical-backend:latest
    container_name: medical-backend
    restart: unless-stopped
    depends_on:
      - postgres
      - ai-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
    volumes:
      - ../apps/ai-service/data/exports/backend-import:/import/backend-import:ro
      - ../apps/ai-service/data/raw/medications.csv:/data/medications.csv:ro
    networks:
      - medical-net

  frontend:
    image: s1156856/medical-frontend:latest
    container_name: medical-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - medical-net

networks:
  medical-net:
    driver: bridge

volumes:
  postgres_data:
