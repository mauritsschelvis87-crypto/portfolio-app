upstream homecinema_app {
    server homecinema-frontend:80;
}

upstream medical_app {
    server medical-frontend:80;
}

server {
    listen 80;
    listen [::]:80;
    server_name films.maurits-portfolio.nl;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name films.maurits-portfolio.nl;

    ssl_certificate /etc/letsencrypt/live/maurits-portfolio.nl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/maurits-portfolio.nl/privkey.pem;

    location / {
        proxy_pass http://homecinema_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

