# Overige projecten op dezelfde server

upstream homecinema_app {
    server homecinema-frontend:80;
}

upstream medical_app {
    server medical-frontend:80;
}

# Film webshop — http://178.105.245.202:8080/
server {
    listen 8080;
    server_name 178.105.245.202;

    location / {
        proxy_pass http://homecinema_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Medisch AI platform — http://178.105.245.202:8082/
server {
    listen 8082;
    server_name 178.105.245.202;

    location / {
        proxy_pass http://medical_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
