# Film webshop — https://films.maurits-portfolio.nl

upstream homecinema_app {
    server homecinema-frontend:80;
}

upstream medical_app {
    server medical-frontend:80;
}

server {
    listen 80;
    server_name films.maurits-portfolio.nl;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://homecinema_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Medisch AI platform — https://medical.maurits-portfolio.nl

server {
    listen 80;
    server_name medical.maurits-portfolio.nl;

    location /.well-known/acme-challenge/ {
