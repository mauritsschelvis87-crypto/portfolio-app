services:
  postgres:
    image: postgres:16-alpine
    container_name: homecinema-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-webshop-films-db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: s1156856/homecinema-backend:latest
    container_name: homecinema-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_DB: ${POSTGRES_DB:-webshop-films-db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-eenHeelLangEnWillekeurigGeheimVoorDockerOntwikkeling12345!}
    depends_on:
      - postgres

  frontend:
    image: s1156856/homecinema-frontend:latest
    container_name: homecinema-frontend
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  postgres_data:
